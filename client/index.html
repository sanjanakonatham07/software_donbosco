<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO & Description -->
    <meta name="description" content="Don Bosco School Management and ERP portal for administrators, teachers, and students." />
    <meta name="keywords" content="Don Bosco, School ERP, School Management, Admin Portal, Student Management" />
    <meta name="author" content="Don Bosco Public School" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color (browser UI color) -->
    <meta name="theme-color" content="#1e3a8a" />

    <!-- iOS / Safari PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Don Bosco" />
    <!-- Apple touch icons — largest matching size takes priority -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <!-- Microsoft Tiles (Windows PWA) -->
    <meta name="msapplication-TileColor" content="#1e3a8a" />
    <meta name="msapplication-TileImage" content="/icon-144x144.png" />
    <meta name="msapplication-square70x70logo" content="/icon-72x72.png" />
    <meta name="msapplication-square150x150logo" content="/icon-144x144.png" />
    <meta name="msapplication-wide310x150logo" content="/icon-wide-310x150.png" />
    <meta name="msapplication-square310x310logo" content="/icon-512x512.png" />
    <meta name="msapplication-config" content="none" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Don Bosco School - ERP & Management Portal" />
    <meta property="og:description" content="Don Bosco School Management and ERP portal for administrators, teachers, and students." />
    <meta property="og:image" content="/icon-512x512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />

    <!-- Preconnect for Google Fonts (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Don Bosco School - ERP & Management Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
